# Configuración de despliegue en Render.com (plan gratuito).
#
# La app scrapea la SMV BAJO DEMANDA: al arrancar sincroniza el catálogo de
# empresas (buscable al instante) y, al abrir una empresa, descarga sus estados
# financieros de la SMV en vivo (~30-40s la primera vez) y los cachea. Un solo
# worker con timeout amplio porque el scrape en vivo puede tardar. El plan
# gratuito no permite disco persistente: la BD vive en /tmp (efímero); si el
# servicio reinicia, el catálogo se re-sincroniza y las empresas se re-cachean
# al consultarse.
services:
  - type: web
    name: analisis-fundamental-smv
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LIVE_SCRAPE
        value: "1"
      - key: SMV_DB_PATH
        value: "/tmp/smv_analisis.db"
