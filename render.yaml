# Configuración de despliegue en Render.com (plan gratuito).
# El scrape en vivo puede tardar ~30-40s, por eso se usa un solo worker con
# timeout amplio. El plan gratuito NO permite disco persistente: la BD SQLite
# vive en el almacenamiento efímero del contenedor (la caché se regenera al
# reiniciar; el catálogo de empresas se re-sincroniza al arrancar).
services:
  - type: web
    name: analisis-fundamental-smv
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LIVE_SCRAPE
        value: "1"
      - key: SMV_DB_PATH
        value: "/tmp/smv_analisis.db"
