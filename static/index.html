<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Análisis Fundamental SMV Perú</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Análisis Fundamental<small>Empresas de la SMV · Perú</small></div>
    <div id="search-slot"></div>
    <div class="filters">
      <select id="f-year" aria-label="Año"></select>
      <select id="f-semester" aria-label="Semestre">
        <option value="1">1er semestre</option>
        <option value="2">2do semestre</option>
      </select>
      <select id="f-sector" aria-label="Sector"><option value="">Todos los sectores</option></select>
      <button id="f-clear" class="ghost" title="Limpiar filtros">Limpiar</button>
      <span class="last-update" id="last-update"></span>
    </div>
  </header>

  <main>
    <section>
      <h1>Panorama del mercado</h1>
      <p class="subtitle">Plataforma educativa y analítica. No constituye recomendación de compra o venta.</p>
      <div class="stats-row" id="summary"></div>
    </section>

    <section>
      <h2>Empresas más rentables</h2>
      <div class="tabs" id="prof-tabs">
        <button data-metric="roic" class="active">ROIC</button>
        <button data-metric="roe">ROE</button>
        <button data-metric="roa">ROA</button>
        <button data-metric="operating_margin">Margen operativo</button>
        <button data-metric="net_margin">Margen neto</button>
        <button data-metric="free_cash_flow">FCF</button>
        <button data-metric="revenue_growth_yoy">Crec. ingresos</button>
        <button data-metric="net_income_growth_yoy">Crec. utilidad</button>
      </div>
      <label style="font-size:.82rem;color:var(--ink-2)">
        <input type="checkbox" id="prof-financial"> Ver empresas financieras (ranking separado)
      </label>
      <div id="ranking-prof" style="margin-top:10px"></div>
    </section>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="dual">
      <section>
        <h2>Mayor crecimiento de ingresos</h2>
        <div id="ranking-growth"></div>
      </section>
      <section>
        <h2>Mejor generación de caja</h2>
        <div id="ranking-cash"></div>
      </section>
    </div>

    <section>
      <h2>Empresas con alertas</h2>
      <div id="alerts-list"></div>
    </section>
  </main>

  <script type="module" src="/static/js/home.js"></script>
</body>
</html>
